stages:
  - test
  - deploy

analyze:
  stage: test
  image: ghcr.io/cirruslabs/flutter:stable
  before_script:
    - mkdir -p lib/config
    - echo "const String groqApiKey = '';" > lib/config/secrets.dart
    - flutter pub get
  script:
    - flutter analyze --no-fatal-infos --no-fatal-warnings
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: test
  image: ghcr.io/cirruslabs/flutter:stable
  before_script:
    - mkdir -p lib/config
    - echo "const String groqApiKey = '';" > lib/config/secrets.dart
    - flutter pub get
  script:
    - flutter test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pages:
  stage: deploy
  script:
    - echo "Deploying static site to GitLab Pages"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
